server {
    listen 80;
    server_name demo-api.knowtheclaw.com;

    # Redirect HTTP to HTTPS (certbot will add the SSL block)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name demo-api.knowtheclaw.com;

    # SSL certs managed by certbot — these lines get added automatically
    # ssl_certificate /etc/letsencrypt/live/demo-api.knowtheclaw.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/demo-api.knowtheclaw.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for agent responses (can take a few seconds)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS — locked to knowtheclaw.com only
        add_header Access-Control-Allow-Origin "https://knowtheclaw.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://knowtheclaw.com";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }

    # Block everything else
    location / {
        return 404;
    }
}
